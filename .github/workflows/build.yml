name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite SSH to HTTPS for submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Verify build
        run: |
          # Exclude cmd/bydll (requires pre-built DLL) and platform/desktop (requires CGO headers)
          go build $(go list ./... | grep -v -E '(cmd/bydll|platform/desktop)')

      - name: Run vet
        run: |
          go vet $(go list ./... | grep -v -E '(cmd/bydll|platform/desktop)')
